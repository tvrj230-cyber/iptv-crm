<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV CRM - Painel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-bolt logo-icon"></i>
                <h2>IPTV CRM</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-target="dashboard-metrics-container">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-target="board-container">
                    <i class="fa-solid fa-table-columns"></i> Kanban
                </a>
                <a href="#" class="nav-item" data-target="messages-container">
                    <i class="fa-solid fa-message"></i> Mensagens
                </a>
                <a href="#" class="nav-item" data-target="broadcast-container">
                    <i class="fa-solid fa-paper-plane"></i> Disparos
                </a>
                <a href="#" class="nav-item" data-target="followup-container">
                    <i class="fa-solid fa-clock-rotate-left"></i> Follow-ups
                </a>
                <a href="#" class="nav-item" data-target="import-container">
                    <i class="fa-solid fa-file-import"></i> Importar
                </a>
                <a href="#" class="nav-item" data-target="quick-send-container">
                    <i class="fa-solid fa-bolt"></i> Disparo Avulso
                </a>
                <a href="#" class="nav-item" data-target="test-manager-container">
                    <i class="fa-solid fa-object-ungroup"></i> Funil de Teste
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <span>Admin</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar leads...">
                </div>
                <div class="top-actions">
                    <button id="addLeadBtn" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> Novo Lead
                    </button>
                </div>
            </header>

            <div class="dashboard-container" id="dashboard-metrics-container">
                <div class="dashboard-header">
                    <h2>Visão Geral</h2>
                    <p>Resumo de desempenho e leads</p>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background-color: rgba(59, 130, 246, 0.1); color: #3B82F6;">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <div class="kpi-data">
                            <span class="kpi-label">Total de Leads</span>
                            <span class="kpi-value" id="kpi-total-leads">0</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background-color: rgba(16, 185, 129, 0.1); color: #10B981;">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>
                        <div class="kpi-data">
                            <span class="kpi-label">Novos Hoje</span>
                            <span class="kpi-value" id="kpi-novos-hoje">0</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background-color: rgba(245, 158, 11, 0.1); color: #F59E0B;">
                            <i class="fa-solid fa-crown"></i>
                        </div>
                        <div class="kpi-data">
                            <span class="kpi-label">Ativos Atuais</span>
                            <span class="kpi-value" id="kpi-ativos">0</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background-color: rgba(139, 92, 246, 0.1); color: #8B5CF6;">
                            <i class="fa-solid fa-percent"></i>
                        </div>
                        <div class="kpi-data">
